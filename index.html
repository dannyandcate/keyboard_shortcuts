<!DOCTYPE html>
<html lang="en">
<head>
	<title>Keyboard Shortcuts</title>
	<meta charset="UTF-8">
	<meta name="description" content="A Document to make Keyboard Shortcuts">
	<style>
		* {
			box-sizing: border-box;
		}
		body {
			min-height: 100vh;
			margin: 0px;
			padding: 0px;
		}
		.main-container {
			background-color: aliceblue;
			margin: 1px;
			border: 2px solid #445e51;
			padding: 9px;
			min-height: 100vh;
		}
		header, .row {
		display: flex;  /* aligns all child elements (flex items) in a row */
			border-radius: 8px;
			border: 2px outset #81B29A;
			background-color: #F4F1DE;
			margin: 9px;
			padding: 18px;
			font-family: Georgia, serif;
			font-size: 27px;
			text-align: center;
			color: #12623b;
		}
		
		.col {
			flex: 1;        /* distributes space on the line equally among items */
			border-radius: 8px;
			border: 2px outset #81B29A;
			background-color: #F2CC8F;
			margin: 9px;
			padding: 18px;
		}
		span {
			font-weight: bold;
		}
	</style>
</head>

<body>

<div class="main-container">

<section>
  <header>
	<div class="col">One</div><span>+</span>
	<div class="col">To Tree</div><span>+</span>
	<div class="col">Descriptions, or more</div>
  </header>
  <div class="row">
	<div class="col">And</div><span>+</span>
	<div class="col">Unlimited</div><span>+</span>
	<div class="col">Steps</div><span>+</span>
	<div class="col">To</div><span>+</span>
	<div class="col">Shortcuts</div>
  </div>
</section>



</div><!-- *===[ Main-Container-End ]===* -->

</body>
</html>
